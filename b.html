<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boutique — Tous nos produits | Sen Vaisselle</title>
<meta name="description" content="Parcourez tous les produits Sen Vaisselle : assiettes, verres, marmites, ustensiles de cuisine et plus. Filtrez par catégorie et prix, recherchez instantanément.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://senvaisselle.com/pages/boutique.html">
<meta property="og:title" content="Boutique Sen Vaisselle">
<meta property="og:description" content="Toute la vaisselle et les articles ménagers Sen Vaisselle, commande facile sur WhatsApp.">
<meta property="og:type" content="website">
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap');

:root{
  /* --- Couleurs de marque --- */
  --navy: #0A3D91;
  --navy-dark: #072a66;
  --navy-tint: #EEF3FC;
  --orange: #F7941D;
  --orange-dark: #d97b0a;
  --white: #FFFFFF;
  --cream: #FBFAF7;
  --ink: #16202E;
  --ink-soft: #55637A;
  --line: #E7EAF1;
  --success: #1FA855;
  --danger: #E4483C;

  /* --- Typographie --- */
  --font-display: 'Fraunces', serif;
  --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  /* --- Rayon / ombre --- */
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 28px;
  --shadow-soft: 0 6px 24px rgba(10,61,145,0.08);
  --shadow-lift: 0 18px 40px rgba(10,61,145,0.16);
  --ease: cubic-bezier(.22,.61,.36,1);
}

*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  font-family:var(--font-body);
  color:var(--ink);
  background:var(--white);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4,.font-display{font-family:var(--font-display);}
a{text-decoration:none;color:inherit;}
img{max-width:100%;display:block;}
.container-xl{max-width:1280px;margin:0 auto;padding:0 24px;}

/* Respect reduced motion */
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; scroll-behavior:auto !important;}
}

/* ============ Barre d'annonce ============ */
.announce-bar{
  background:var(--navy);
  color:#fff;
  font-size:.82rem;
  letter-spacing:.02em;
  text-align:center;
  padding:8px 12px;
}
.announce-bar strong{color:var(--orange);}

/* ============ Navigation ============ */
.sv-navbar{
  background:rgba(255,255,255,.92);
  backdrop-filter:saturate(180%) blur(10px);
  border-bottom:1px solid var(--line);
  position:sticky; top:0; z-index:1000;
}
.sv-navbar .navbar-brand{
  font-family:var(--font-display);
  font-weight:600;
  font-size:1.5rem;
  color:var(--navy);
  display:flex; align-items:center; gap:10px;
}
.sv-navbar .navbar-brand .plate-mark{
  width:34px;height:34px;border-radius:50%;
  background:conic-gradient(from 220deg, var(--orange), var(--navy) 55%, var(--orange));
  position:relative;
  box-shadow: inset 0 0 0 3px #fff, 0 0 0 1px var(--line);
}
.sv-nav-link{
  font-weight:600;
  font-size:.94rem;
  color:var(--ink);
  padding:10px 14px !important;
  position:relative;
}
.sv-nav-link::after{
  content:"";
  position:absolute; left:14px; right:14px; bottom:6px; height:2px;
  background:var(--orange);
  transform:scaleX(0); transform-origin:left;
  transition:transform .25s var(--ease);
}
.sv-nav-link:hover::after,
.sv-nav-link.active::after{transform:scaleX(1);}
.sv-nav-link.active{color:var(--navy);}

.sv-search-btn, .sv-icon-btn{
  border:1.5px solid var(--line);
  background:#fff;
  width:42px;height:42px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  color:var(--navy);
  transition:all .2s var(--ease);
}
.sv-search-btn:hover, .sv-icon-btn:hover{background:var(--navy-tint); border-color:var(--navy);}

/* ============ Boutons ============ */
.btn-sv-primary{
  background:var(--orange);
  border:none;
  color:#fff !important;
  font-weight:700;
  padding:12px 26px;
  border-radius:999px;
  transition:transform .2s var(--ease), box-shadow .2s var(--ease), background .2s;
  box-shadow:0 10px 24px rgba(247,148,29,.28);
}
.btn-sv-primary:hover{background:var(--orange-dark); transform:translateY(-2px); box-shadow:0 14px 30px rgba(247,148,29,.36);}
.btn-sv-outline{
  background:transparent;
  border:1.5px solid var(--navy);
  color:var(--navy) !important;
  font-weight:700;
  padding:11px 24px;
  border-radius:999px;
  transition:all .2s var(--ease);
}
.btn-sv-outline:hover{background:var(--navy); color:#fff !important;}
.btn-whatsapp{
  background:var(--success);
  color:#fff !important;
  border:none;
  font-weight:700;
  border-radius:999px;
  padding:10px 18px;
  display:inline-flex; align-items:center; gap:8px;
  transition:transform .2s var(--ease), box-shadow .2s var(--ease);
  box-shadow:0 8px 20px rgba(31,168,85,.25);
  width:100%;
  justify-content:center;
}
.btn-whatsapp:hover{transform:translateY(-2px); box-shadow:0 12px 26px rgba(31,168,85,.35); color:#fff !important;}

/* ============ Hero (signature : assiette radiale) ============ */
.sv-hero{
  position:relative;
  overflow:hidden;
  background:var(--cream);
  padding:72px 0 88px;
}
.sv-hero .plate-orbit{
  position:absolute;
  right:-180px; top:50%; transform:translateY(-50%);
  width:640px; height:640px;
  border-radius:50%;
  background:
    radial-gradient(circle at 50% 50%, #fff 0 38%, transparent 39%),
    conic-gradient(from 0deg, rgba(10,61,145,.10), rgba(247,148,29,.16), rgba(10,61,145,.10));
  box-shadow: inset 0 0 0 1px rgba(10,61,145,.08);
}
.sv-hero .plate-orbit::before{
  content:"";
  position:absolute; inset:70px;
  border-radius:50%;
  border:1px dashed rgba(10,61,145,.18);
}
.sv-hero-eyebrow{
  font-family:var(--font-mono);
  letter-spacing:.14em;
  text-transform:uppercase;
  font-size:.76rem;
  color:var(--orange-dark);
  font-weight:600;
}
.sv-hero h1{
  font-size:clamp(2.4rem, 4.2vw, 3.8rem);
  line-height:1.05;
  color:var(--navy);
  font-weight:600;
  margin:14px 0 20px;
  max-width:620px;
}
.sv-hero h1 em{color:var(--orange); font-style:normal;}
.sv-hero p.lead{
  color:var(--ink-soft);
  max-width:520px;
  font-size:1.08rem;
  margin-bottom:32px;
}
.sv-hero-stats{
  display:flex; gap:36px; margin-top:48px; flex-wrap:wrap;
}
.sv-hero-stats .stat-num{
  font-family:var(--font-mono);
  font-size:1.6rem; font-weight:600; color:var(--navy);
}
.sv-hero-stats .stat-label{font-size:.8rem; color:var(--ink-soft);}

/* ============ Sections ============ */
.sv-section{padding:76px 0;}
.sv-section.alt{background:var(--navy-tint);}
.sv-section-head{
  display:flex; align-items:flex-end; justify-content:space-between;
  margin-bottom:36px; flex-wrap:wrap; gap:16px;
}
.sv-eyebrow{
  font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.12em;
  font-size:.74rem; color:var(--orange-dark); font-weight:600; display:block; margin-bottom:8px;
}
.sv-section-head h2{
  font-size:clamp(1.7rem,2.6vw,2.3rem); color:var(--navy); margin:0; font-weight:600;
}

/* ============ Catégories ============ */
.cat-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:var(--radius-lg) var(--radius-lg) var(--radius-sm) var(--radius-sm);
  padding:26px 18px;
  text-align:center;
  transition:transform .25s var(--ease), box-shadow .25s var(--ease), border-color .25s;
  height:100%;
}
.cat-card:hover{transform:translateY(-6px); box-shadow:var(--shadow-lift); border-color:transparent;}
.cat-card .cat-icon{
  width:60px;height:60px;border-radius:50%;
  background:var(--navy-tint);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;
  color:var(--navy); font-size:1.4rem;
  transition:background .25s, color .25s;
}
.cat-card:hover .cat-icon{background:var(--orange); color:#fff;}
.cat-card h3{font-size:.98rem; margin:0; font-weight:700; font-family:var(--font-body); color:var(--ink);}
.cat-card .cat-count{font-size:.78rem; color:var(--ink-soft); margin-top:2px;}

/* ============ Cartes produit ============ */
.product-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:var(--radius-md);
  overflow:hidden;
  height:100%;
  display:flex; flex-direction:column;
  transition:transform .25s var(--ease), box-shadow .25s var(--ease);
  position:relative;
}
.product-card:hover{transform:translateY(-5px); box-shadow:var(--shadow-lift);}
.product-card .pc-media{
  position:relative;
  aspect-ratio:1/1;
  background:var(--navy-tint);
  overflow:hidden;
}
.product-card .pc-media img{width:100%;height:100%;object-fit:cover; transition:transform .5s var(--ease);}
.product-card:hover .pc-media img{transform:scale(1.06);}
.pc-badges{position:absolute; top:12px; left:12px; display:flex; flex-direction:column; gap:6px; z-index:2;}
.pc-badge{
  font-family:var(--font-mono);
  font-size:.68rem; font-weight:600; letter-spacing:.03em;
  padding:4px 10px; border-radius:999px; text-transform:uppercase;
  color:#fff;
}
.pc-badge.new{background:var(--navy);}
.pc-badge.promo{background:var(--orange);}
.pc-badge.featured{background:var(--ink);}
.pc-badge.out{background:var(--danger);}
.pc-body{padding:16px 16px 18px; display:flex; flex-direction:column; flex:1;}
.pc-cat{font-size:.72rem; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em; margin-bottom:4px;}
.pc-title{font-weight:700; font-size:1rem; margin:0 0 6px; line-height:1.3; min-height:2.5em;}
.pc-swatch{width:14px;height:14px;border-radius:50%; display:inline-block; border:1px solid rgba(0,0,0,.15); vertical-align:middle; margin-right:6px;}
.pc-price-row{display:flex; align-items:baseline; gap:10px; margin:8px 0 14px; font-family:var(--font-mono);}
.pc-price{font-weight:700; font-size:1.15rem; color:var(--navy);}
.pc-price-old{font-size:.85rem; color:var(--ink-soft); text-decoration:line-through;}
.pc-discount{font-size:.72rem; color:var(--orange-dark); font-weight:700;}
.pc-ref{font-family:var(--font-mono); font-size:.68rem; color:var(--ink-soft); margin-top:auto;}

/* ============ WhatsApp flottant ============ */
.wa-float{
  position:fixed; right:22px; bottom:22px; z-index:1200;
  width:60px; height:60px; border-radius:50%;
  background:var(--success); color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:1.6rem;
  box-shadow:0 12px 30px rgba(31,168,85,.4);
  animation:wa-pulse 2.6s infinite;
}
.wa-float:hover{color:#fff;}
@keyframes wa-pulse{
  0%{box-shadow:0 0 0 0 rgba(31,168,85,.45), 0 12px 30px rgba(31,168,85,.4);}
  70%{box-shadow:0 0 0 14px rgba(31,168,85,0), 0 12px 30px rgba(31,168,85,.4);}
  100%{box-shadow:0 0 0 0 rgba(31,168,85,0), 0 12px 30px rgba(31,168,85,.4);}
}

/* ============ Footer ============ */
.sv-footer{background:var(--navy); color:#dfe7f7; padding:64px 0 24px;}
.sv-footer h5{color:#fff; font-family:var(--font-display); font-weight:600; margin-bottom:16px;}
.sv-footer a{color:#c3d2ef; transition:color .2s;}
.sv-footer a:hover{color:var(--orange);}
.sv-footer .footer-bottom{border-top:1px solid rgba(255,255,255,.12); margin-top:40px; padding-top:20px; font-size:.82rem; color:#9fb2d8;}

/* ============ Filtres / recherche ============ */
.filter-bar{
  background:#fff; border:1px solid var(--line); border-radius:var(--radius-md);
  padding:16px; box-shadow:var(--shadow-soft);
}
.form-control-sv, .form-select-sv{
  border:1.5px solid var(--line); border-radius:var(--radius-sm);
  padding:10px 14px; font-family:var(--font-body); font-size:.92rem;
}
.form-control-sv:focus, .form-select-sv:focus{border-color:var(--navy); box-shadow:0 0 0 3px rgba(10,61,145,.12); outline:none;}

/* ============ Pages statiques (À propos / Contact) ============ */
.info-card{background:#fff; border:1px solid var(--line); border-radius:var(--radius-md); padding:28px;}

/* ============ Admin ============ */
.admin-shell{display:flex; min-height:100vh; background:var(--cream);}
.admin-sidebar{
  width:260px; background:var(--navy); color:#fff; flex-shrink:0;
  padding:26px 18px; position:sticky; top:0; height:100vh; overflow-y:auto;
}
.admin-sidebar .brand{font-family:var(--font-display); font-size:1.3rem; font-weight:600; margin-bottom:30px; display:flex; gap:10px; align-items:center;}
.admin-sidebar a.nav-item{
  display:flex; align-items:center; gap:12px;
  color:#c3d2ef; padding:11px 14px; border-radius:12px; font-weight:600; font-size:.92rem;
  margin-bottom:4px; transition:all .2s;
}
.admin-sidebar a.nav-item:hover, .admin-sidebar a.nav-item.active{background:rgba(255,255,255,.1); color:#fff;}
.admin-main{flex:1; padding:32px; min-width:0;}
.admin-topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; flex-wrap:wrap; gap:12px;}
.kpi-card{background:#fff; border:1px solid var(--line); border-radius:var(--radius-md); padding:20px; box-shadow:var(--shadow-soft);}
.kpi-card .kpi-num{font-family:var(--font-mono); font-size:1.7rem; font-weight:700; color:var(--navy);}
.kpi-card .kpi-label{font-size:.8rem; color:var(--ink-soft);}
.admin-card{background:#fff; border:1px solid var(--line); border-radius:var(--radius-md); padding:24px; box-shadow:var(--shadow-soft);}
.dropzone{
  border:2px dashed var(--navy); border-radius:var(--radius-md); padding:34px; text-align:center;
  color:var(--navy); background:var(--navy-tint); cursor:pointer; transition:all .2s;
}
.dropzone.dragover{background:#dce8fb; border-color:var(--orange);}
.img-thumb{
  position:relative; width:100%; aspect-ratio:1/1; border-radius:10px; overflow:hidden;
  border:2px solid var(--line); cursor:grab; background:#fff;
}
.img-thumb img{width:100%;height:100%;object-fit:cover;}
.img-thumb .thumb-remove{
  position:absolute; top:4px; right:4px; background:var(--danger); color:#fff; border:none;
  width:22px;height:22px;border-radius:50%; font-size:.7rem; line-height:1;
}
.img-thumb.is-main{border-color:var(--orange);}
.img-thumb .main-tag{
  position:absolute; bottom:4px; left:4px; background:var(--orange); color:#fff; font-size:.6rem;
  padding:2px 6px; border-radius:6px; font-weight:700; text-transform:uppercase;
}
.badge-status-on{background:rgba(31,168,85,.12); color:var(--success); padding:4px 10px; border-radius:999px; font-size:.72rem; font-weight:700;}
.badge-status-off{background:rgba(228,72,60,.12); color:var(--danger); padding:4px 10px; border-radius:999px; font-size:.72rem; font-weight:700;}

/* Login admin */
.auth-shell{min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--navy); background-image:radial-gradient(circle at 20% 20%, rgba(247,148,29,.18), transparent 40%), radial-gradient(circle at 80% 80%, rgba(255,255,255,.08), transparent 40%);}
.auth-card{background:#fff; border-radius:var(--radius-lg); padding:42px; width:100%; max-width:420px; box-shadow:0 30px 60px rgba(0,0,0,.35);}

/* ============ Skeleton loading ============ */
.skel{background:linear-gradient(90deg, #eef1f6 25%, #e4e9f2 37%, #eef1f6 63%); background-size:400% 100%; animation:skel 1.4s ease infinite;}
@keyframes skel{0%{background-position:100% 50%;}100%{background-position:0 50%;}}

/* ============ Focus visibility ============ */
a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{
  outline:3px solid rgba(10,61,145,.45); outline-offset:2px;
}

/* ============ Responsive ============ */
@media (max-width: 991px){
  .sv-hero .plate-orbit{display:none;}
  .admin-sidebar{position:fixed; left:-280px; z-index:1300; transition:left .25s var(--ease); box-shadow:20px 0 40px rgba(0,0,0,.2);}
  .admin-sidebar.open{left:0;}
  .admin-main{padding:20px;}
}
@media (max-width: 576px){
  .sv-hero{padding:52px 0 60px;}
  .sv-section{padding:52px 0;}
}

  </style>
</head>
<body>

<div id="sv-navbar"></div>

<header class="sv-hero" style="padding:48px 0 40px;">
  <div class="container-xl position-relative">
    <span class="sv-hero-eyebrow">Catalogue complet</span>
    <h1 style="font-size:clamp(2rem,3.4vw,2.8rem);">La boutique Sen Vaisselle</h1>
    <p class="lead mb-0">Filtrez par catégorie, prix ou disponibilité, ou recherchez directement un produit par nom, référence ou prix.</p>
  </div>
</header>

<section class="sv-section pt-4">
  <div class="container-xl">
    <div class="filter-bar mb-4" data-aos="fade-up">
      <div class="row g-3 align-items-center">
        <div class="col-lg-4">
          <label class="form-label small fw-semibold mb-1">Recherche</label>
          <div class="position-relative">
            <i class="fa-solid fa-magnifying-glass position-absolute" style="left:14px;top:50%;transform:translateY(-50%);color:var(--ink-soft)"></i>
            <input type="text" id="searchInput" class="form-control form-control-sv ps-5" placeholder="Nom, référence, prix...">
          </div>
        </div>
        <div class="col-6 col-lg-2">
          <label class="form-label small fw-semibold mb-1">Catégorie</label>
          <select id="filterCategory" class="form-select form-select-sv"></select>
        </div>
        <div class="col-6 col-lg-2">
          <label class="form-label small fw-semibold mb-1">Prix max</label>
          <select id="filterPrice" class="form-select form-select-sv">
            <option value="">Tous les prix</option>
            <option value="5000">Moins de 5 000 FCFA</option>
            <option value="15000">Moins de 15 000 FCFA</option>
            <option value="30000">Moins de 30 000 FCFA</option>
            <option value="1000000">Toutes gammes</option>
          </select>
        </div>
        <div class="col-6 col-lg-2">
          <label class="form-label small fw-semibold mb-1">Disponibilité</label>
          <select id="filterAvailability" class="form-select form-select-sv">
            <option value="">Toutes</option>
            <option value="1">En stock</option>
          </select>
        </div>
        <div class="col-6 col-lg-2">
          <label class="form-label small fw-semibold mb-1">Trier par</label>
          <select id="filterSort" class="form-select form-select-sv">
            <option value="recent">Plus récent</option>
            <option value="price-asc">Prix croissant</option>
            <option value="price-desc">Prix décroissant</option>
            <option value="name">Nom (A-Z)</option>
          </select>
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
      <span class="text-muted small" id="resultsCount">Chargement des produits...</span>
    </div>

    <div class="row g-4" id="productsGrid"></div>
  </div>
</section>

<div id="sv-footer"></div>
<div id="sv-wa-float"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

<script>window.SV_BASE = "../"; window.SV_PAGE = "boutique";</script>
<script type="module" src="../js/components.js"></script>
<script type="module">
import { fetchProducts, renderProductCard, renderSkeletonCards, renderEmptyState, renderErrorState } from "../js/products.js";
import { fetchCategories } from "../js/categories.js";
import { getQueryParam, debounce } from "../js/utils.js";

const grid = document.getElementById("productsGrid");
const countEl = document.getElementById("resultsCount");
const searchInput = document.getElementById("searchInput");
const catSelect = document.getElementById("filterCategory");
const priceSelect = document.getElementById("filterPrice");
const availSelect = document.getElementById("filterAvailability");
const sortSelect = document.getElementById("filterSort");

grid.innerHTML = renderSkeletonCards(8);
let allProducts = [];

fetchCategories().then(categories => {
  catSelect.innerHTML = '<option value="">Toutes les catégories</option>' +
    categories.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
  const presetCat = getQueryParam("categorie");
  if (presetCat) catSelect.value = presetCat;

  fetchProducts().then(products => {
    if (products === null) { grid.innerHTML = renderErrorState(); countEl.textContent = ""; return; }
    allProducts = products;
    applyFilters();
  });
});

function applyFilters() {
  let list = [...allProducts];
  const term = searchInput.value.trim().toLowerCase();
  if (term) {
    list = list.filter(p =>
      (p.name || "").toLowerCase().includes(term) ||
      (p.reference || "").toLowerCase().includes(term) ||
      String(p.price || "").includes(term) ||
      (p.categoryId || "").toLowerCase().includes(term)
    );
  }
  if (catSelect.value) list = list.filter(p => p.categoryId === catSelect.value);
  if (priceSelect.value) list = list.filter(p => Number(p.price) <= Number(priceSelect.value));
  if (availSelect.value) list = list.filter(p => p.availability !== false && p.stock > 0);

  switch (sortSelect.value) {
    case "price-asc": list.sort((a,b) => (a.price||0)-(b.price||0)); break;
    case "price-desc": list.sort((a,b) => (b.price||0)-(a.price||0)); break;
    case "name": list.sort((a,b) => (a.name||"").localeCompare(b.name||"")); break;
    default: break; // déjà trié par date via Firestore
  }

  countEl.textContent = `${list.length} produit${list.length>1?"s":""} trouvé${list.length>1?"s":""}`;
  grid.innerHTML = list.length ? list.map(renderProductCard).join("") : renderEmptyState("Aucun produit ne correspond à votre recherche.");
}

const debouncedFilter = debounce(applyFilters, 200);
searchInput.addEventListener("input", debouncedFilter);
[catSelect, priceSelect, availSelect, sortSelect].forEach(el => el.addEventListener("change", applyFilters));
</script>
</body>
</html>
