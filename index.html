<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENERAL VAISELLE</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */

header{
background:white;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
font-size:22px;
font-weight:bold;
color:#f68b1e;
cursor:pointer;
}

.search-bar{
width:40%;
padding:10px;
border-radius:5px;
border:1px solid #ccc;
}

/* MENU */

.menu{
background:#f68b1e;
padding:10px;
text-align:center;
}

.menu a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

/* LAYOUT */

.layout{
display:flex;
}

.categories{
width:220px;
background:white;
padding:15px;
}

.categories ul{
list-style:none;
padding:0;
}

.categories li{
padding:10px;
cursor:pointer;
}

/* CONTENT */

.content{
flex:1;
padding:15px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

/* PRODUIT */

.produit{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.produit img{
width:100%;
height:180px;
object-fit:cover;
}

.produit-info{
padding:10px;
}

.prix{
color:#f68b1e;
font-weight:bold;
}

/* BUTTON */

.btn{
background:#f68b1e;
color:white;
padding:10px;
border:none;
width:100%;
border-radius:5px;
cursor:pointer;
}

/* PANIER */

.panier-float{
position:fixed;
right:15px;
bottom:15px;
background:#f68b1e;
color:white;
padding:15px;
border-radius:50px;
cursor:pointer;
}

.panier-box{
background:white;
padding:15px;
border-radius:10px;
margin-top:20px;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal img{
max-width:90%;
}

/* FOOTER */

footer{
background:black;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

/* MOBILE */

@media (max-width:768px){

header{
flex-direction:column;
gap:10px;
}

.search-bar{
width:90%;
}

.menu{
display:flex;
overflow-x:auto;
}

.menu a{
flex:0 0 auto;
margin:0 10px;
font-size:14px;
}

.layout{
flex-direction:column;
}

.categories{
width:100%;
}

.categories ul{
display:flex;
overflow-x:auto;
}

.categories li{
flex:0 0 auto;
background:white;
margin-right:10px;
padding:8px;
border-radius:5px;
}

.grid{
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.produit img{
height:130px;
}

.panier-float{
padding:12px;
font-size:18px;
}

}

</style>
</head>

<body>

<div class="panier-float" onclick="scrollToCommande()">
🛒 <span id="count">0</span>
</div>

<header>

<div class="logo" onclick="filtrer('all')">GENERAL VAISELLE</div>

<input type="text" id="recherche" class="search-bar"
placeholder="Rechercher..." onkeyup="rechercherProduit()">

</header>

<nav class="menu">
<a onclick="filtrer('all')">Accueil</a>
<a onclick="filtrer('cuisine')">Cuisine</a>
<a onclick="filtrer('vaisselle')">Vaisselle</a>
<a onclick="filtrer('tasses')">Tasses</a>
</nav>

<div class="layout">

<aside class="categories">
<ul>
<li onclick="filtrer('all')">Tous</li>
<li onclick="filtrer('vaisselle')">Vaisselle</li>
<li onclick="filtrer('bols')">Bols</li>
<li onclick="filtrer('tasses')">Tasses</li>
<li onclick="filtrer('cuisine')">Cuisine</li>
</ul>
</aside>

<div class="content">

<h2>Produits</h2>

<div class="grid" id="produits"></div>

<section id="commande">

<h2>Panier</h2>
<div id="panier" class="panier-box">Panier vide</div>

<p>Total : <span id="totalPrix">0</span> FCFA</p>

</section>

</div>
</div>

<footer>
<p>© 2026 GENERAL VAISELLE</p>
</footer>

<div class="modal" id="modal" onclick="fermerZoom()">
<img id="zoomImg">
</div>

<script>

/* PRODUITS */

let produits = [
{nom:"Ensemble glasser", prix:9000, image:"A.jpeg", cat:"vaisselle"},
{nom:"Mixeur", prix:12000, image:"B.jpeg", cat:"cuisine"},
{nom:"Tasses", prix:3000, image:"10.jpeg", cat:"tasses"},
{nom:"Bol", prix:5000, image:"I.jpeg", cat:"bols"},
{nom:"Deli Glass", prix:2500, image:"3.jpeg", cat:"tasses"},
{nom:"Tabouret", prix:1500, image:"T.jpeg", cat:"maison"}
];

/* PANIER */

let panier=[];

/* AFFICHER */

function afficherProduits(liste=produits){

let c=document.getElementById("produits");
c.innerHTML="";

liste.forEach(p=>{
c.innerHTML+=`
<div class="produit">
<img src="${p.image}" onclick="zoom('${p.image}')">
<div class="produit-info">
<h4>${p.nom}</h4>
<p class="prix">${p.prix} FCFA</p>
<button class="btn" onclick="ajouterProduitPanier('${p.nom}',${p.prix})">
Ajouter
</button>
</div>
</div>`;
});

}

/* FILTRE */

function filtrer(cat){
if(cat==="all"){afficherProduits(produits);return;}
afficherProduits(produits.filter(p=>p.cat===cat));
}

/* RECHERCHE */

function rechercherProduit(){
let val=document.getElementById("recherche").value.toLowerCase();
afficherProduits(produits.filter(p=>p.nom.toLowerCase().includes(val)));
}

/* PANIER */

function ajouterProduitPanier(nom,prix){
let exist=panier.find(p=>p.nom===nom);
if(exist){exist.qte++}
else{panier.push({nom,prix,qte:1})}
afficherPanier();
}

function afficherPanier(){
let div=document.getElementById("panier");
div.innerHTML="";
let total=0;

if(panier.length===0){div.innerHTML="Panier vide"}

panier.forEach((p,i)=>{
let st=p.prix*p.qte;
total+=st;

div.innerHTML+=`
<p>${p.nom} x${p.qte} = ${st}
<button onclick="moins(${i})">-</button>
<button onclick="plus(${i})">+</button>
</p>`;
});

document.getElementById("totalPrix").innerText=total;
document.getElementById("count").innerText=
panier.reduce((s,p)=>s+p.qte,0);
}

function plus(i){panier[i].qte++;afficherPanier()}
function moins(i){panier[i].qte--;if(panier[i].qte<=0)panier.splice(i,1);afficherPanier()}

/* ZOOM */

function zoom(src){
document.getElementById("modal").style.display="flex";
document.getElementById("zoomImg").src=src;
}

function fermerZoom(){
document.getElementById("modal").style.display="none";
}

/* SCROLL */

function scrollToCommande(){
document.getElementById("commande").scrollIntoView({behavior:"smooth"});
}

/* INIT */

window.onload=()=>{afficherProduits();}

</script>

</body>
</html>
```
