<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENERAL VAISELLE</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */

header{
background:#fff;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
font-weight:bold;
font-size:22px;
color:#f68b1e;
}

.search-bar{
width:40%;
padding:10px;
border-radius:5px;
border:1px solid #ccc;
}

/* MENU */

.menu{
background:#f68b1e;
padding:10px;
text-align:center;
}

.menu a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

/* SLIDER */

.slider{
width:100%;
height:220px;
overflow:hidden;
}

.slides{
display:flex;
width:1300%;
animation: slideAuto 50s linear infinite;
}

.slides img{
width:100%;
height:220px;
object-fit:cover;
}

@keyframes slideAuto{
0%{transform:translateX(0);}
10%{transform:translateX(-100%);}
20%{transform:translateX(-200%);}
30%{transform:translateX(-300%);}
40%{transform:translateX(-400%);}
50%{transform:translateX(-500%);}
60%{transform:translateX(-600%);}
70%{transform:translateX(-700%);}
80%{transform:translateX(-800%);}
90%{transform:translateX(-900%);}
100%{transform:translateX(0);}
}

/* SECTION */

.section{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* PRODUITS */

.produit{
background:#fff;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
transition:0.3s;
position:relative;
}

.produit:hover{
transform:scale(1.03);
}

.produit img{
width:100%;
height:180px;
object-fit:cover;
}

.produit-info{
padding:10px;
}

.prix{
color:#f68b1e;
font-weight:bold;
font-size:18px;
}

.promo{
position:absolute;
background:red;
color:white;
padding:3px 6px;
font-size:12px;
top:5px;
left:5px;
border-radius:4px;
}

.btn{
background:#f68b1e;
color:white;
padding:10px;
border:none;
width:100%;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

.btn:hover{
background:#d97706;
}

/* PANIER */

.panier-box{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

input{
padding:10px;
margin:5px;
width:90%;
border-radius:5px;
border:1px solid #ccc;
}

/* FOOTER */

footer{
background:#000;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>
</head>

<body>

<header>
<div class="logo">GENERAL VAISELLE</div>

<input type="text" id="recherche" class="search-bar" placeholder="Rechercher produit..." onkeyup="rechercherProduit()">

</header>

<nav class="menu">
<a href="#">Accueil</a>
<a href="#">Cuisine</a>
<a href="#">Vaisselle</a>
<a href="#">Promo</a>
<a href="#">Contact</a>
</nav>

<div class="slider">
<div class="slides">

<img src="A.jpeg">
<img src="B.jpeg">
<img src="C.jpeg">
<img src="D.jpeg">
<img src="3.jpeg">
<img src="4.jpeg">
<img src="6.jpeg">
<img src="7.jpeg">
<img src="A.jpeg">
<img src="8.jpeg">
<img src="H.jpeg">
<img src="K.jpeg">
<img src="L.jpeg">

</div>
</div>

<section class="section">

<h2>Produits</h2>

<div class="grid" id="produits"></div>

</section>

<section class="section" id="commande">

<h2>🛒 Panier</h2>

<div id="panier" class="panier-box">Panier vide</div>

<p><strong>Total: <span id="totalPrix">0</span> FCFA</strong></p>

</section>

<section class="section">

<h2>📦 Livraison</h2>

<input type="text" id="clientNom" placeholder="Nom complet">

<input type="text" id="clientTel" placeholder="Téléphone">

<input type="text" id="clientAdresse" placeholder="Adresse">

<button class="btn" onclick="commander()">Commander</button>

<p>Livraison : 1000 FCFA partout à Dakar</p>

</section>

<footer>

<p>© 2026 GENERAL VAISELLE</p>

<p>Livraison rapide partout à Dakar</p>

</footer>

<script>

let produits = [

{nom:"Ensemble glasser", prix:9000, image:"A.jpeg"},
{nom:"Mixeur 1", prix:12000, image:"B.jpeg"},
{nom:"Mixeur 2", prix:10000, image:"C.jpeg"},
{nom:"Range toilette", prix:6000, image:"D.jpeg"},
{nom:"Ensemble gamel", prix:15000, image:"H.jpeg"},
{nom:"Deli Glass", prix:2500, image:"3.jpeg"},
{nom:"7 paquets de bol", prix:3500, image:"11.jpeg"},
{nom:"Tasses", prix:3000, image:"10.jpeg"},
{nom:"Bol", prix:5000, image:"I.jpeg"},
{nom:"Tasse 6pcs", prix:1500, image:"4.jpeg"},
{nom:"Bol en verre", prix:1500, image:"5.jpeg"},
{nom:"Bol ensemble", prix:15500, image:"M.jpeg"},
{nom:"Nappes toile 2pcs", prix:3000, image:"8.jpeg"},
{nom:"Tasses 2pcs", prix:3500, image:"6.jpeg"},
{nom:"Tabouret", prix:1500, image:"T.jpeg"},
{nom:"Tasse deli glass 6pcs", prix:3000, image:"U.jpeg"},
{nom:"Glassser ensemble", prix:15000, image:"7.jpeg"}

];

let panier=[];
let fraisLivraison=1000;

function afficherProduits(liste=produits){

let c=document.getElementById("produits");

c.innerHTML="";

liste.forEach(p=>{

c.innerHTML+=`

<div class="produit">

<span class="promo">PROMO</span>

<img src="${p.image}" onerror="this.src='https://via.placeholder.com/300'">

<div class="produit-info">

<h4>${p.nom}</h4>

<p class="prix">${p.prix} FCFA</p>

<button class="btn" onclick="ajouterProduitPanier('${p.nom}',${p.prix})">

Ajouter au panier

</button>

</div>

</div>

`;

});

}

function rechercherProduit(){

let val=document.getElementById("recherche").value.toLowerCase();

afficherProduits(produits.filter(p=>p.nom.toLowerCase().includes(val)));

}

function ajouterProduitPanier(nom,prix){

let exist=panier.find(p=>p.nom===nom);

if(exist){

exist.qte++;

}else{

panier.push({nom,prix,qte:1});

}

afficherPanier();

}

function afficherPanier(){

let div=document.getElementById("panier");

div.innerHTML="";

let total=0;

if(panier.length===0){

div.innerHTML="Panier vide";

}

panier.forEach((p,i)=>{

let st=p.prix*p.qte;

total+=st;

div.innerHTML+=`

<p>

${p.nom} x${p.qte} = ${st} FCFA

<button onclick="moins(${i})">➖</button>

<button onclick="plus(${i})">➕</button>

<button onclick="supprimer(${i})">❌</button>

</p>

`;

});

document.getElementById("totalPrix").innerText=total;

}

function plus(i){

panier[i].qte++;

afficherPanier();

}

function moins(i){

panier[i].qte>1?panier[i].qte--:panier.splice(i,1);

afficherPanier();

}

function supprimer(i){

panier.splice(i,1);

afficherPanier();

}

function commander(){

let nom=document.getElementById("clientNom").value;

let tel=document.getElementById("clientTel").value;

let adresse=document.getElementById("clientAdresse").value;

if(panier.length===0){

alert("Panier vide");

return;

}

if(!nom||!tel||!adresse){

alert("Remplir les informations");

return;

}

let total=panier.reduce((s,p)=>s+p.prix*p.qte,0)+fraisLivraison;

let msg=encodeURIComponent(

`Commande GENERAL VAISELLE

Nom:${nom}

Tel:${tel}

Adresse:${adresse}

Articles:

${panier.map(p=>p.nom+" x"+p.qte).join("\n")}

Total:${total} FCFA`

);

window.open(`https://wa.me/221784314946?text=${msg}`);

panier=[];

afficherPanier();

}

window.onload=()=>{

afficherProduits();

}

</script>

</body>
</html>
