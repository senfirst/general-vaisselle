<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENERAL VAISELLE</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* TOP BAR */
.topbar{
background:#000;color:#fff;text-align:center;
padding:6px;font-size:13px
}

/* HEADER */
header{
background:#fff;padding:10px;
display:flex;flex-direction:column;
gap:8px;position:sticky;top:0;z-index:1000;
}

.logo{
font-size:20px;font-weight:bold;
color:#ff6600;text-align:center
}

.search{
width:100%;padding:10px;
border-radius:8px;border:1px solid #ccc
}

/* BARRE CATEGORIES */
.catBar{
display:flex;overflow-x:auto;
background:#fff;padding:10px;
gap:10px;border-bottom:1px solid #eee
}

.catBar::-webkit-scrollbar{display:none}

.catBtn{
flex:0 0 auto;
padding:8px 14px;
background:#f2f2f2;
border-radius:20px;
font-size:14px;
cursor:pointer;
white-space:nowrap
}

.catBtn.active{
background:#ff6600;color:#fff
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;padding:10px
}

/* CARD */
.card{
background:#fff;border-radius:10px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,.1)
}

.card img{
width:100%;height:130px;
object-fit:cover
}

.info{padding:8px}

.info h4{
font-size:14px;margin:0 0 5px 0
}

.price{
color:#ff6600;font-weight:bold;
font-size:14px
}

.btn{
background:#ff6600;color:#fff;
border:none;padding:8px;
width:100%;border-radius:6px
}

/* CART FLOAT */
.cart{
position:fixed;bottom:70px;right:15px;
background:#ff6600;color:#fff;
padding:12px;border-radius:50px
}

.cart span{
background:#fff;color:#ff6600;
padding:3px 7px;border-radius:50%;
margin-left:5px
}

/* PANIER */
.cartPanel{
position:fixed;top:0;left:0;
width:100%;height:100%;
background:#fff;z-index:2000;
display:none;flex-direction:column;
padding:15px
}

.cartPanel.active{display:flex}

input,select{
width:100%;padding:10px;margin:5px 0;
border-radius:6px;border:1px solid #ccc
}

/* NAV BAS */
.bottomNav{
position:fixed;bottom:0;left:0;
width:100%;background:#fff;
display:flex;justify-content:space-around;
padding:10px;
box-shadow:0 -2px 10px rgba(0,0,0,.1)
}

.bottomNav div{
text-align:center;font-size:14px;cursor:pointer
}
</style>
</head>

<body>

<div class="topbar">
🚚 Livraison gratuite dès 25 000 FCFA
</div>

<header>
<div class="logo">GENERAL VAISELLE</div>
<input class="search" id="search" placeholder="Rechercher..." onkeyup="searchProduit()">
</header>

<!-- BARRE CATEGORIES -->
<div class="catBar">
<div class="catBtn active" onclick="setCat(this,'all')">Tous</div>
<div class="catBtn" onclick="setCat(this,'vaisselle')">🍽️ Vaisselle</div>
<div class="catBtn" onclick="setCat(this,'bol')">🥣 Bols</div>
<div class="catBtn" onclick="setCat(this,'tasse')">☕ Tasses</div>
</div>

<div class="grid" id="products"></div>

<!-- PANIER -->
<div class="cart" onclick="ouvrirPanier()">
🛒 <span id="count">0</span>
</div>

<div id="cartPanel" class="cartPanel">

<h2>Panier</h2>
<div id="panier"></div>

<select id="zone" onchange="showPanier()">
<option value="dakar">Dakar</option>
<option value="hors">Hors Dakar</option>
</select>

<p>Livraison : <span id="livraison">1000</span> FCFA</p>
<p><b>Total : <span id="total">0</span> FCFA</b></p>

<input id="nom" placeholder="Nom">
<input id="tel" placeholder="Téléphone">
<input id="adresse" placeholder="Adresse">

<button class="btn" onclick="commander()">Commander WhatsApp</button>
<button class="btn" onclick="fermerPanier()">Fermer</button>

</div>

<!-- NAV BAS -->
<div class="bottomNav">
<div onclick="setCat(document.querySelectorAll('.catBtn')[0],'all')">🏠</div>
<div onclick="setCat(document.querySelectorAll('.catBtn')[1],'vaisselle')">🍽️</div>
<div onclick="setCat(document.querySelectorAll('.catBtn')[2],'bol')">🥣</div>
<div onclick="setCat(document.querySelectorAll('.catBtn')[3],'tasse')">☕</div>
</div>

<script>
let produits=[
{nom:"Ensemble glasser", prix:9000, image:"A.jpeg"}, 
 {nom:"Mixeur 1", prix:12000, image:"B.jpeg"},
 {nom:"Mixeur 2", prix:10000, image:"C.jpeg"},
 {nom:"Range toilette", prix:6000, image:"D.jpeg"},
 {nom:"Ensemble gamel", prix:15000, image:"H.jpeg"}, 
 {nom:"Deli Glass", prix:2500, image:"3.jpeg"},
 {nom:"7 paquets de bol", prix:3500, image:"11.jpeg"},
 {nom:"Tasses", prix:3000, image:"10.jpeg"},
 {nom:"Bol", prix:5000, image:"I.jpeg"},
 {nom:"Tasse 6pcs", prix:1500, image:"4.jpeg"}, 
 {nom:"Bol en verre", prix:1500, image:"5.jpeg"},
 {nom:"Bol ensemble", prix:15500, image:"M.jpeg"},
 {nom:"Nappes toile 2pcs", prix:3000, image:"8.jpeg"}, 
 {nom:"Tasses 2pcs", prix:3500, image:"6.jpeg"},
 {nom:"Tabouret", prix:1500, image:"T.jpeg"},
 {nom:"Tasse deli glass 6pcs", prix:3000, image:"U.jpeg"}, 
 {nom:"tasses", prix:6000, image:"13.jpeg"}, 
 {nom:"tasses", prix:5000, image:"14.jpeg"},
 {nom:"ensemble marmite", prix:12000, image:"15.jpeg"},
 {nom:"marmite", prix:3500, image:"16.jpeg"}, 
 {nom:"marmite", prix:3000, image:"17.jpeg"}, 
 {nom:"tasses 6pcs", prix:3500, image:"18.jpeg"},
 {nom:"Tasses boissons", prix:3500, image:"19.jpeg"}, 
 {nom:"ensemble", prix:12000, image:"20.jpeg"}, 
 {nom:"Bol en plastique", prix:500, image:"21.jpeg"}, 
 {nom:"Bol en verre", prix:1500, image:"5.jpeg"},
 {nom:"Bol ensemble", prix:15500, image:"M.jpeg"},
 {nom:"Nappes toile 2pcs", prix:3000, image:"8.jpeg"},
 {nom:"Tasses 2pcs", prix:3500, image:"6.jpeg"},
 {nom:"Tabouret", prix:1500, image:"T.jpeg"},
 {nom:"Tasse deli glass 6pcs", prix:3000, image:"U.jpeg"},
 {nom:"Glassser ensemble", prix:15000, image:"7.jpeg"}

]

let panier=[]

function afficherProduits(liste=produits){
let c=document.getElementById("products")
c.innerHTML=""
liste.forEach(p=>{
c.innerHTML+=`
<div class="card">
<img src="${p.image}">
<div class="info">
<h4>${p.nom}</h4>
<p class="price">${p.prix} FCFA</p>
<button class="btn" onclick="add('${p.nom}',${p.prix})">Ajouter</button>
</div>
</div>`
})
}

function filtrer(cat){
if(cat==="all") afficherProduits()
else afficherProduits(produits.filter(p=>p.cat===cat))
}

function setCat(el,cat){
document.querySelectorAll(".catBtn")
.forEach(b=>b.classList.remove("active"))
el.classList.add("active")
filtrer(cat)
}

function searchProduit(){
let v=document.getElementById("search").value.toLowerCase()
afficherProduits(produits.filter(p=>p.nom.toLowerCase().includes(v)))
}

function add(nom,prix){
let e=panier.find(p=>p.nom===nom)
if(e) e.qte++
else panier.push({nom,prix,qte:1})
showPanier()
}

function showPanier(){

let div=document.getElementById("panier")
div.innerHTML=""

let total=0

panier.forEach((p,i)=>{
let st=p.prix*p.qte
total+=st

div.innerHTML+=`
<p>
${p.nom} x${p.qte} = ${st} FCFA
<button onclick="plus(${i})">+</button>
<button onclick="moins(${i})">-</button>
</p>`
})

let zone=document.getElementById("zone").value

let livraison=0
if(total>=25000){
livraison=0
}else{
livraison = zone==="dakar" ? 1000 : 3000
}

document.getElementById("livraison").innerText=livraison
document.getElementById("total").innerText=total+livraison
document.getElementById("count").innerText=
panier.reduce((s,p)=>s+p.qte,0)

}

function plus(i){panier[i].qte++;showPanier()}
function moins(i){
panier[i].qte--
if(panier[i].qte<=0) panier.splice(i,1)
showPanier()
}

function ouvrirPanier(){
document.getElementById("cartPanel").classList.add("active")
showPanier()
}

function fermerPanier(){
document.getElementById("cartPanel").classList.remove("active")
}

function commander(){

let nom=document.getElementById("nom").value
let tel=document.getElementById("tel").value
let adr=document.getElementById("adresse").value
let zone=document.getElementById("zone").value

let livraison=document.getElementById("livraison").innerText
let total=document.getElementById("total").innerText

let msg=encodeURIComponent(
`Commande GENERAL VAISELLE

Nom:${nom}
Tel:${tel}
Adresse:${adr}
Zone:${zone}

${panier.map(p=>p.nom+" x"+p.qte).join("\n")}

Livraison:${livraison} FCFA
Total:${total} FCFA`
)

window.open(`https://wa.me/221784314946?text=${msg}`)
}

afficherProduits()

</script>

</body>
</html>
