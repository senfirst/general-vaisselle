<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENERAL VAISELLE</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f1f1f1;
}

/* HEADER */
header{
background:#fff;
padding:10px;
display:flex;
align-items:center;
gap:10px;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 2px 5px rgba(0,0,0,.05);
}

.logo{
font-size:18px;
font-weight:bold;
color:#f68b1e;
white-space:nowrap;
}

.search{
flex:1;
padding:10px;
border-radius:25px;
border:none;
background:#f5f5f5;
}

/* CATEGORIES */
.catBar{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
background:#fff;
}

.catBtn{
flex:0 0 auto;
padding:8px 14px;
background:#f5f5f5;
border-radius:20px;
font-size:13px;
}

.catBtn.active{
background:#f68b1e;
color:#fff;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

/* CARD PRODUIT */
.card{
background:#fff;
border-radius:8px;
overflow:hidden;
box-shadow:0 1px 4px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:130px;
object-fit:cover;
}

.info{
padding:8px;
}

.info h4{
font-size:13px;
margin:0;
height:32px;
overflow:hidden;
}

.price{
color:#f68b1e;
font-weight:bold;
font-size:14px;
margin-top:5px;
}

/* BOUTON */
.btn{
background:#f68b1e;
color:#fff;
border:none;
padding:10px;
width:100%;
border-radius:6px;
margin-top:6px;
font-size:14px;
}

/* PANIER FLOAT */
.cart{
position:fixed;
bottom:70px;
right:15px;
background:#f68b1e;
color:#fff;
padding:12px;
border-radius:50%;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

/* BADGE */
.cart span{
background:#fff;
color:#f68b1e;
padding:3px 7px;
border-radius:50%;
margin-left:5px;
}

/* NAV BAS */
.bottomNav{
position:fixed;
bottom:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-around;
padding:10px 0;
box-shadow:0 -2px 8px rgba(0,0,0,.1);
}

.bottomNav div{
font-size:12px;
text-align:center;
}

/* ESPACE POUR NAV */
body{
padding-bottom:70px;
}
  .card:hover{
transform:scale(1.02);
transition:0.2s;
}

.btn:active{
transform:scale(0.95);
}
</style>
</head>

<body>

<div class="topbar">
🚚 Livraison gratuite dès 25 000 FCFA
</div>

<header>
<div class="logo">🛒 GV</div>
<input class="search" placeholder="Rechercher produit...">
</header>
<!-- CATEGORIES -->
<div class="catBar">
<div class="catBtn active" onclick="setCat(this,'all')">Tous</div>
<div class="catBtn" onclick="setCat(this,'vaisselle')">🍽️ Vaisselle</div>
<div class="catBtn" onclick="setCat(this,'bol')">🥣 Bols</div>
<div class="catBtn" onclick="setCat(this,'tasse')">☕ Tasses</div>
</div>

<div class="grid" id="products"></div>

<!-- PANIER -->
<div class="cart" onclick="ouvrirPanier()">
🛒 <span id="count">0</span>
</div>

<div id="cartPanel" class="cartPanel">
<h2>Panier</h2>
<div id="panier"></div>

<select id="zone" onchange="showPanier()">
<option value="dakar">Dakar</option>
<option value="hors">Hors Dakar</option>
</select>

<p>Livraison : <span id="livraison">1000</span> FCFA</p>
<p><b>Total : <span id="total">0</span> FCFA</b></p>

<input id="nom" placeholder="Nom">
<input id="tel" placeholder="Téléphone">
<input id="adresse" placeholder="Adresse">

<button class="btn" onclick="commander()">Commander WhatsApp</button>
<button class="btn" onclick="fermerPanier()">Fermer</button>
</div>

<!-- NAV BAS -->
<div class="bottomNav">
<div onclick="setCat(document.querySelectorAll('.catBtn')[0],'all')">🏠</div>
<div onclick="setCat(document.querySelectorAll('.catBtn')[1],'vaisselle')">🍽️</div>
<div onclick="setCat(document.querySelectorAll('.catBtn')[2],'bol')">🥣</div>
<div onclick="setCat(document.querySelectorAll('.catBtn')[3],'tasse')">☕</div>
</div>

<script>

let produits=[
{nom:"Ensemble glasser", prix:9000, image:"A.jpeg", cat:"vaisselle"},
{nom:"Mixeur 1", prix:12000, image:"B.jpeg", cat:"vaisselle"},
{nom:"Mixeur 2", prix:10000, image:"C.jpeg", cat:"vaisselle"},
{nom:"Range toilette", prix:6000, image:"D.jpeg", cat:"vaisselle"},
{nom:"Ensemble gamel", prix:15000, image:"H.jpeg", cat:"vaisselle"},

{nom:"Deli Glass", prix:2500, image:"3.jpeg", cat:"tasse"},
{nom:"Tasses", prix:3000, image:"10.jpeg", cat:"tasse"},
{nom:"Tasse 6pcs", prix:1500, image:"4.jpeg", cat:"tasse"},
{nom:"Tasses 2pcs", prix:3500, image:"6.jpeg", cat:"tasse"},
{nom:"Tasse deli glass 6pcs", prix:3000, image:"U.jpeg", cat:"tasse"},

{nom:"Bol", prix:5000, image:"I.jpeg", cat:"bol"},
{nom:"Bol en verre", prix:1500, image:"5.jpeg", cat:"bol"},
{nom:"7 paquets de bol", prix:3500, image:"11.jpeg", cat:"bol"},
{nom:"Bol ensemble", prix:15500, image:"M.jpeg", cat:"bol"},
{nom:"Bol en plastique", prix:500, image:"21.jpeg", cat:"bol"}
]
let panier=[]

function afficherProduits(liste=produits){
let c=document.getElementById("products")
c.innerHTML=""
liste.forEach(p=>{
c.innerHTML+=`
<div class="card">
<img src="${p.image}">
<div class="info">
<h4>${p.nom}</h4>
<p class="price">${p.prix} FCFA</p>
<button class="btn" onclick="add('${p.nom}',${p.prix})">Ajouter</button>
</div>
</div>`
})
}

function filtrer(cat){
if(cat==="all") afficherProduits()
else afficherProduits(produits.filter(p=>p.cat===cat))
}

function setCat(el,cat){
document.querySelectorAll(".catBtn").forEach(b=>b.classList.remove("active"))
el.classList.add("active")
filtrer(cat)
}

function searchProduit(){
let v=document.getElementById("search").value.toLowerCase()
afficherProduits(produits.filter(p=>p.nom.toLowerCase().includes(v)))
}

function add(nom,prix){
let e=panier.find(p=>p.nom===nom)
if(e) e.qte++
else panier.push({nom,prix,qte:1})
showPanier()
}

function showPanier(){
let div=document.getElementById("panier")
div.innerHTML=""
let total=0

panier.forEach((p,i)=>{
let st=p.prix*p.qte
total+=st

div.innerHTML+=`
<p>${p.nom} x${p.qte} = ${st} FCFA
<button onclick="plus(${i})">+</button>
<button onclick="moins(${i})">-</button>
</p>`
})

let zone=document.getElementById("zone").value
let livraison = total>=25000 ? 0 : (zone==="dakar" ? 1000 : 3000)

document.getElementById("livraison").innerText=livraison
document.getElementById("total").innerText=total+livraison
document.getElementById("count").innerText=panier.reduce((s,p)=>s+p.qte,0)
}

function plus(i){panier[i].qte++;showPanier()}
function moins(i){
panier[i].qte--
if(panier[i].qte<=0) panier.splice(i,1)
showPanier()
}

function ouvrirPanier(){
document.getElementById("cartPanel").classList.add("active")
showPanier()
}

function fermerPanier(){
document.getElementById("cartPanel").classList.remove("active")
}

function commander(){
let nom=document.getElementById("nom").value
let tel=document.getElementById("tel").value
let adr=document.getElementById("adresse").value
let zone=document.getElementById("zone").value
let livraison=document.getElementById("livraison").innerText
let total=document.getElementById("total").innerText

let msg=encodeURIComponent(
`Commande GENERAL VAISELLE

Nom:${nom}
Tel:${tel}
Adresse:${adr}
Zone:${zone}

${panier.map(p=>p.nom+" x"+p.qte).join("\n")}

Livraison:${livraison} FCFA
Total:${total} FCFA`
)

window.open(`https://wa.me/221784314946?text=${msg}`,"_blank")
}

afficherProduits()

</script>

</body>
</html>
