<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENERAL VAISELLE</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#f68b1e;
  --orange-dark:#e07510;
  --orange-light:#fff3e0;
  --dark:#1a1a2e;
  --mid:#4a4a6a;
  --light:#f8f7f4;
  --white:#ffffff;
  --radius:14px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--light);
  color:var(--dark);
  padding-bottom:80px;
}

.topbar{
  background:var(--orange);
  color:#fff;
  text-align:center;
  padding:7px;
  font-size:12px;
  font-family:'Syne',sans-serif;
  font-weight:600;
  letter-spacing:.05em;
}

header{
  background:var(--white);
  padding:12px 16px;
  display:flex;
  align-items:center;
  gap:12px;
  position:sticky;
  top:0;
  z-index:900;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
}

.logo{
  font-family:'Syne',sans-serif;
  font-size:20px;
  font-weight:800;
  color:var(--orange);
  white-space:nowrap;
  display:flex;
  align-items:center;
  gap:6px;
}

.logo-icon{
  width:36px;height:36px;
  background:var(--orange);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  flex-shrink:0;
}

.search-wrap{flex:1;position:relative;}
.search-wrap::before{
  content:"🔍";
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  font-size:14px;pointer-events:none;
}
.search{
  width:100%;
  padding:10px 12px 10px 36px;
  border-radius:25px;
  border:2px solid transparent;
  background:#f4f4f4;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  transition:.2s;
  outline:none;
}
.search:focus{border-color:var(--orange);background:#fff}

.banner{
  margin:14px 14px 0;
  background:linear-gradient(120deg,var(--orange) 0%,#ff9a3c 100%);
  border-radius:var(--radius);
  padding:18px 20px;
  color:#fff;
  display:flex;
  justify-content:space-between;
  align-items:center;
  overflow:hidden;
  position:relative;
}
.banner::after{
  content:"🍽️";
  position:absolute;right:-10px;bottom:-10px;
  font-size:72px;opacity:.2;
}
.banner-title{
  font-family:'Syne',sans-serif;
  font-size:18px;font-weight:800;line-height:1.2;
}
.banner-sub{font-size:12px;opacity:.9;margin-top:4px}
.banner-badge{
  background:#fff;color:var(--orange);
  font-family:'Syne',sans-serif;font-weight:800;font-size:11px;
  padding:6px 12px;border-radius:20px;white-space:nowrap;
}

.cat-section{padding:14px 14px 4px;}
.cat-label{
  font-family:'Syne',sans-serif;
  font-size:11px;font-weight:700;color:var(--mid);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;
}
.catBar{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.catBar::-webkit-scrollbar{display:none}

.catBtn{
  flex:0 0 auto;
  padding:9px 18px;
  background:#fff;
  border:2px solid transparent;
  border-radius:25px;
  font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;
  cursor:pointer;transition:.2s;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}
.catBtn:hover{border-color:var(--orange);color:var(--orange)}
.catBtn.active{
  background:var(--orange);color:#fff;
  border-color:var(--orange);
  box-shadow:0 4px 12px rgba(246,139,30,.35);
}

.section-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 14px 8px;
}
.section-head h2{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;}
.section-head span{font-size:12px;color:var(--orange);font-weight:500;}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:0 14px 14px;
}

.card{
  background:var(--white);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.07);
  transition:.25s ease;
  position:relative;
  animation:fadeIn .3s ease both;
}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(246,139,30,.18);}

.card-img-wrap{position:relative;overflow:hidden;}
.card-img{width:100%;height:140px;object-fit:cover;background:#f0f0f0;display:block;}

.card-badge{
  position:absolute;top:8px;left:8px;
  background:var(--orange);color:#fff;
  font-size:10px;font-weight:700;
  padding:3px 8px;border-radius:10px;
  font-family:'Syne',sans-serif;
}

.info{padding:10px 10px 12px;}
.info h4{
  font-family:'Syne',sans-serif;
  font-size:13px;font-weight:600;
  height:34px;overflow:hidden;line-height:1.3;
}
.price{
  color:var(--orange);
  font-family:'Syne',sans-serif;
  font-weight:800;font-size:15px;margin-top:4px;
}

.btn{
  background:var(--orange);color:#fff;
  border:none;padding:9px;width:100%;
  border-radius:8px;margin-top:8px;
  font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;
  cursor:pointer;transition:.2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn:hover{background:var(--orange-dark)}
.btn:active{transform:scale(0.96)}

.empty{grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--mid);}
.empty-icon{font-size:48px;margin-bottom:10px;}

.cart-fab{
  position:fixed;bottom:90px;right:16px;
  background:var(--orange);color:#fff;
  width:54px;height:54px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  box-shadow:0 4px 16px rgba(246,139,30,.5);
  cursor:pointer;transition:.2s;z-index:800;
}
.cart-fab:hover{transform:scale(1.08)}

.cart-badge{
  position:absolute;top:-4px;right:-4px;
  background:#fff;color:var(--orange);
  font-family:'Syne',sans-serif;font-weight:800;font-size:11px;
  min-width:20px;height:20px;border-radius:10px;padding:0 5px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,.15);
}

.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:1000;opacity:0;pointer-events:none;transition:.3s;
}
.overlay.active{opacity:1;pointer-events:all}

.cartPanel{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--white);
  border-radius:24px 24px 0 0;
  padding:20px 20px 30px;
  z-index:1001;
  max-height:90vh;overflow-y:auto;
  transform:translateY(100%);
  transition:.35s cubic-bezier(.4,0,.2,1);
  box-shadow:0 -8px 32px rgba(0,0,0,.12);
}
.cartPanel.active{transform:translateY(0)}

.panel-handle{
  width:40px;height:4px;background:#ddd;
  border-radius:2px;margin:0 auto 16px;
}
.panel-title{
  font-family:'Syne',sans-serif;
  font-size:20px;font-weight:800;
  margin-bottom:16px;
}

.cart-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 0;border-bottom:1px solid #f0f0f0;
}
.cart-item-info{flex:1}
.cart-item-name{font-size:14px;font-weight:500}
.cart-item-price{font-size:13px;color:var(--orange);font-weight:600;margin-top:2px}
.cart-item-controls{display:flex;align-items:center;gap:6px;}
.ctrl{
  width:30px;height:30px;border-radius:8px;
  border:2px solid #eee;background:#fff;
  font-size:16px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:.15s;color:var(--dark);
}
.ctrl:hover{border-color:var(--orange);color:var(--orange)}
.ctrl-qty{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;min-width:20px;text-align:center;}

.cart-empty{text-align:center;padding:30px;color:var(--mid);font-size:14px;}
.cart-empty-icon{font-size:40px;margin-bottom:8px;}

.cart-summary{
  background:var(--orange-light);border-radius:var(--radius);
  padding:14px;margin:14px 0;
}
.summary-row{display:flex;justify-content:space-between;font-size:14px;padding:3px 0;}
.summary-row.total{
  font-family:'Syne',sans-serif;font-weight:800;font-size:16px;
  border-top:1px solid rgba(246,139,30,.2);
  margin-top:6px;padding-top:8px;color:var(--orange);
}

.form-group{margin-bottom:10px}
.form-group label{
  display:block;font-size:11px;font-weight:600;color:var(--mid);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;
}
.form-group input,
.form-group select{
  width:100%;padding:11px 14px;
  border:2px solid #eee;border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:14px;
  outline:none;transition:.2s;background:#fff;
}
.form-group input:focus,
.form-group select:focus{border-color:var(--orange)}

.btn-whatsapp{
  background:#25D366;color:#fff;border:none;
  padding:14px;width:100%;border-radius:12px;
  font-size:15px;font-family:'Syne',sans-serif;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:.2s;margin-top:14px;
}
.btn-whatsapp:hover{background:#1eb957}

.btn-close{
  background:transparent;color:var(--mid);
  border:2px solid #eee;padding:12px;width:100%;
  border-radius:12px;font-size:14px;
  font-family:'DM Sans',sans-serif;font-weight:500;
  cursor:pointer;margin-top:8px;transition:.2s;
}
.btn-close:hover{border-color:var(--dark);color:var(--dark)}

.bottomNav{
  position:fixed;bottom:0;width:100%;
  background:var(--white);
  display:flex;justify-content:space-around;
  padding:10px 0 14px;
  box-shadow:0 -2px 16px rgba(0,0,0,.07);
  z-index:700;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:10px;font-weight:500;color:var(--mid);
  cursor:pointer;transition:.2s;padding:4px 14px;border-radius:12px;
}
.nav-item:hover,.nav-item.active{color:var(--orange)}
.nav-item .nav-icon{font-size:20px;transition:.2s}
.nav-item.active .nav-icon{transform:scale(1.15)}

.toast{
  position:fixed;bottom:100px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--dark);color:#fff;
  padding:10px 20px;border-radius:25px;
  font-size:13px;opacity:0;transition:.3s;
  z-index:2000;white-space:nowrap;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card:nth-child(1){animation-delay:.04s}
.card:nth-child(2){animation-delay:.08s}
.card:nth-child(3){animation-delay:.12s}
.card:nth-child(4){animation-delay:.16s}
.card:nth-child(5){animation-delay:.20s}
.card:nth-child(6){animation-delay:.24s}
/* ===== RESPONSIVE AMÉLIORÉ ===== */
@media (min-width: 1100px){
  .grid{
    grid-template-columns:repeat(4,1fr);
    max-width:1200px;
    margin:auto;
  }

  header, .banner, .cat-section, .section-head{
    max-width:1200px;
    margin-left:auto;
    margin-right:auto;
  }
}

@media (max-width: 768px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }
}

@media (max-width: 480px){
  .grid{
    grid-template-columns:1fr;
  }
}

/* ===== IMAGE ZOOM (LIGHTBOX) ===== */
.img-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.img-modal img{
  max-width:90%;
  max-height:85%;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}

.img-modal.active{
  display:flex;
  animation:fadeIn .2s ease;
}
</style>
</head>

let panier=[];

function fmtPrice(n){return n.toLocaleString('fr-FR')+" FCFA";}

function afficherProduits(liste){
  if(!liste) liste=produits;
  const c=document.getElementById("products");
  document.getElementById("product-count").textContent=liste.length+" article"+(liste.length>1?"s":"");
  if(!liste.length){
    c.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div>Aucun produit trouvé</div>`;
    return;
  }
  c.innerHTML=liste.map(p=>`
    <div class="card">
      <div class="card-img-wrap">
        <img class="card-img" src="${p.image}" alt="${p.nom}" onerror="this.style.opacity=0">
        <div class="card-badge">${p.cat}</div>
      </div>
      <div class="info">
        <h4>${p.nom}</h4>
        <div class="price">${fmtPrice(p.prix)}</div>
        <button class="btn" onclick="add('${p.nom.replace(/'/g,"\\'")}',${p.prix})">+ Ajouter</button>
      </div>
    </div>`).join("");
}

function filtrer(cat){
  if(cat==="all") afficherProduits(produits);
  else afficherProduits(produits.filter(p=>p.cat===cat));
}

function setCat(el,cat){
  document.querySelectorAll(".catBtn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("section-title").textContent=CAT_LABELS[cat]||cat;
  filtrer(cat);
}

function navClick(el,cat,label){
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  el.classList.add("active");
  const btns=document.querySelectorAll(".catBtn");
  const idx={all:0,vaisselle:1,bol:2,tasse:3}[cat];
  btns.forEach(b=>b.classList.remove("active"));
  btns[idx].classList.add("active");
  document.getElementById("section-title").textContent=label;
  filtrer(cat);
}

function searchProduit(){
  const v=document.getElementById("search").value.toLowerCase().trim();
  if(!v){afficherProduits(produits);return;}
  afficherProduits(produits.filter(p=>p.nom.toLowerCase().includes(v)));
}

function add(nom,prix){
  let e=panier.find(p=>p.nom===nom);
  if(e) e.qte++;
  else panier.push({nom,prix,qte:1});
  updateBadge();
  showToast("✓ "+nom+" ajouté");
}

function updateBadge(){
  const total=panier.reduce((s,p)=>s+p.qte,0);
  const badge=document.getElementById("count");
  badge.textContent=total;
  badge.style.display=total?"flex":"none";
}

function showPanier(){
  const div=document.getElementById("panier");
  const summary=document.getElementById("summary");
  const form=document.getElementById("orderForm");
  if(!panier.length){
    div.innerHTML=`<div class="cart-empty"><div class="cart-empty-icon">🛒</div>Votre panier est vide</div>`;
    summary.style.display="none";
    form.style.display="none";
    return;
  }
  let subtotalVal=0;
  div.innerHTML=panier.map((p,i)=>{
    const st=p.prix*p.qte;
    subtotalVal+=st;
    return `<div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${p.nom}</div>
        <div class="cart-item-price">${fmtPrice(st)}</div>
      </div>
      <div class="cart-item-controls">
        <button class="ctrl" onclick="moins(${i})">−</button>
        <span class="ctrl-qty">${p.qte}</span>
        <button class="ctrl" onclick="plus(${i})">+</button>
      </div>
    </div>`;
  }).join("");
  const zone=document.getElementById("zone").value;
  const livraison=subtotalVal>=25000?0:(zone==="dakar"?1000:3000);
  document.getElementById("subtotal").textContent=fmtPrice(subtotalVal);
  document.getElementById("livraison").textContent=livraison===0?"🎉 Gratuite !":fmtPrice(livraison);
  document.getElementById("total").textContent=fmtPrice(subtotalVal+livraison);
  summary.style.display="block";
  form.style.display="block";
}

function plus(i){panier[i].qte++;updateBadge();showPanier();}
function moins(i){
  panier[i].qte--;
  if(panier[i].qte<=0) panier.splice(i,1);
  updateBadge();showPanier();
}

function ouvrirPanier(){
  document.getElementById("cartPanel").classList.add("active");
  document.getElementById("overlay").classList.add("active");
  showPanier();
}

function fermerPanier(){
  document.getElementById("cartPanel").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}

function commander(){
  const nom=document.getElementById("nom").value.trim();
  const tel=document.getElementById("tel").value.trim();
  const adr=document.getElementById("adresse").value.trim();
  if(!nom||!tel||!adr){showToast("⚠️ Veuillez remplir tous les champs");return;}
  if(!panier.length){showToast("⚠️ Votre panier est vide");return;}
  const zone=document.getElementById("zone").value;
  const livraison=document.getElementById("livraison").textContent;
  const total=document.getElementById("total").textContent;
  const msg=encodeURIComponent(
`🛒 *Commande GENERAL VAISELLE*

👤 Nom : ${nom}
📞 Tél : ${tel}
📍 Adresse : ${adr}
🗺️ Zone : ${zone==="dakar"?"Dakar":"Hors Dakar"}

---
${panier.map(p=>`• ${p.nom} × ${p.qte}  →  ${fmtPrice(p.prix*p.qte)}`).join("\n")}
---
🚚 Livraison : ${livraison}
💰 *Total : ${total}*`
  );
  window.open(`https://wa.me/221784314946?text=${msg}`,"_blank");
}

  
let toastTimer;
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2000);
}
function openImg(src){
  document.getElementById("imgModalSrc").src = src;
  document.getElementById("imgModal").classList.add("active");
}

function closeImgModal(){
  document.getElementById("imgModal").classList.remove("active");
}

afficherProduits(produits);
