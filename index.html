<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENERAL VAISELLE</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* =========================
   TABLETTE
========================= */
@media (min-width: 768px){
  .grid{
    grid-template-columns:repeat(3,1fr);
  }
}

/* =========================
   PC
========================= */
@media (min-width: 1100px){
  .grid{
    grid-template-columns:repeat(4,1fr);
    max-width:1200px;
    margin:auto;
  }

  header,
  .banner,
  .cat-section,
  .section-head{
    max-width:1200px;
    margin:auto;
  }
}

/* =========================
   MOBILE (IMPORTANT FIX)
========================= */
@media (max-width: 768px){

  body{
    padding-bottom:110px;
  }

  header{
    flex-direction:column;
    align-items:stretch;
    gap:10px;
    padding:10px;
  }

  .logo{
    justify-content:center;
    font-size:18px;
  }

  .search{
    width:100%;
    font-size:14px;
  }

  .banner{
    margin:10px;
    padding:14px;
  }

  .catBar{
    padding:10px;
    gap:6px;
  }

  .catBtn{
    font-size:12px;
    padding:7px 12px;
  }

  .section-head{
    padding:10px;
  }

  .grid{
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:0 10px 14px;
  }

  .card{
    border-radius:12px;
  }

  .card-img{
    height:110px;
    object-fit:cover;
  }

  .info h4{
    font-size:12px;
    height:32px;
  }

  .price{
    font-size:14px;
  }

  .btn{
    font-size:12px;
    padding:7px;
  }

  .cart-fab{
    width:50px;
    height:50px;
    font-size:20px;
    bottom:80px;
  }
}

/* =========================
   PETIT MOBILE (TRÈS IMPORTANT)
========================= */
@media (max-width: 420px){

  .grid{
    grid-template-columns:1fr;
  }

  .card-img{
    height:160px;
  }

  .catBar{
    flex-wrap:nowrap;
    overflow-x:auto;
  }
}
</style>
</head>
<body>

<div class="topbar">🚚 Livraison gratuite dès 25 000 FCFA</div>

<header>
  <div class="logo">
    <div class="logo-icon">🛒</div>GV
  </div>
  <div class="search-wrap">
    <input class="search" id="search" placeholder="Rechercher un produit…" oninput="searchProduit()">
  </div>
</header>

<div class="banner">
  <div>
    <div class="banner-title">GENERAL<br>Vaisselle</div>
    <div class="banner-sub">Qualité premium au meilleur prix</div>
  </div>
  <div class="banner-badge">🔥 Promo</div>
</div>

<div class="cat-section">
  <div class="cat-label">Catégories</div>
  <div class="catBar">
    <button class="catBtn active" onclick="setCat(this,'all')">Tous</button>
    <button class="catBtn" onclick="setCat(this,'vaisselle')">🍽️ Vaisselle</button>
    <button class="catBtn" onclick="setCat(this,'bol')">🥣 Bols</button>
    <button class="catBtn" onclick="setCat(this,'tasse')">☕ Tasses</button>
  </div>
</div>

<div class="section-head">
  <h2 id="section-title">Tous les produits</h2>
  <span id="product-count"></span>
</div>

<div class="grid" id="products"></div>

<div class="cart-fab" onclick="ouvrirPanier()">
  🛒
  <div class="cart-badge" id="count" style="display:none">0</div>
</div>

<div class="overlay" id="overlay" onclick="fermerPanier()"></div>

<div class="cartPanel" id="cartPanel">
  <div class="panel-handle"></div>
  <div class="panel-title">🛒 Mon panier</div>
  <div id="panier"></div>
  <div class="cart-summary" id="summary" style="display:none">
    <div class="summary-row"><span>Sous-total</span><span id="subtotal">0 FCFA</span></div>
    <div class="summary-row"><span>Livraison</span><span id="livraison">1 000 FCFA</span></div>
    <div class="summary-row total"><span>Total</span><span id="total">0 FCFA</span></div>
  </div>
  <div id="orderForm" style="display:none">
    <div class="form-group">
      <label>Zone de livraison</label>
      <select id="zone" onchange="showPanier()">
        <option value="dakar">Dakar (1 000 FCFA)</option>
        <option value="hors">Hors Dakar (3 000 FCFA)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Nom complet</label>
      <input id="nom" placeholder="Votre nom…">
    </div>
    <div class="form-group">
      <label>Téléphone</label>
      <input id="tel" placeholder="+221 XX XXX XX XX" type="tel">
    </div>
    <div class="form-group">
      <label>Adresse</label>
      <input id="adresse" placeholder="Votre adresse…">
    </div>
    <button class="btn-whatsapp" onclick="commander()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Commander via WhatsApp
    </button>
  </div>
  <button class="btn-close" onclick="fermerPanier()">✕ Fermer</button>
</div>

<div class="toast" id="toast"></div>

<div class="bottomNav">
  <div class="nav-item active" onclick="navClick(this,'all','Tous les produits')">
    <span class="nav-icon">🏠</span><span>Accueil</span>
  </div>
  <div class="nav-item" onclick="navClick(this,'vaisselle','Vaisselle')">
    <span class="nav-icon">🍽️</span><span>Vaisselle</span>
  </div>
  <div class="nav-item" onclick="navClick(this,'bol','Bols')">
    <span class="nav-icon">🥣</span><span>Bols</span>
  </div>
  <div class="nav-item" onclick="navClick(this,'tasse','Tasses')">
    <span class="nav-icon">☕</span><span>Tasses</span>
  </div>
</div>

  {nom:"Produit A50", prix:1000, image:"A50.jpeg", cat:"tasses"}
];
let panier=[];

function fmtPrice(n){return n.toLocaleString('fr-FR')+" FCFA";}

function afficherProduits(liste){
  if(!liste) liste=produits;
  const c=document.getElementById("products");
  document.getElementById("product-count").textContent=liste.length+" article"+(liste.length>1?"s":"");
  if(!liste.length){
    c.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div>Aucun produit trouvé</div>`;
    return;
  }
  c.innerHTML=liste.map(p=>`
    <div class="card">
      <div class="card-img-wrap">
        <img class="card-img" src="${p.image}" alt="${p.nom}" onerror="this.style.opacity=0">
        <div class="card-badge">${p.cat}</div>
      </div>
      <div class="info">
        <h4>${p.nom}</h4>
        <div class="price">${fmtPrice(p.prix)}</div>
        <button class="btn" onclick="add('${p.nom.replace(/'/g,"\\'")}',${p.prix})">+ Ajouter</button>
      </div>
    </div>`).join("");
}

function filtrer(cat){
  if(cat==="all") afficherProduits(produits);
  else afficherProduits(produits.filter(p=>p.cat===cat));
}

function setCat(el,cat){
  document.querySelectorAll(".catBtn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("section-title").textContent=CAT_LABELS[cat]||cat;
  filtrer(cat);
}

function navClick(el,cat,label){
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  el.classList.add("active");
  const btns=document.querySelectorAll(".catBtn");
  const idx={all:0,vaisselle:1,bol:2,tasse:3}[cat];
  btns.forEach(b=>b.classList.remove("active"));
  btns[idx].classList.add("active");
  document.getElementById("section-title").textContent=label;
  filtrer(cat);
}

function searchProduit(){
  const v=document.getElementById("search").value.toLowerCase().trim();
  if(!v){afficherProduits(produits);return;}
  afficherProduits(produits.filter(p=>p.nom.toLowerCase().includes(v)));
}

function add(nom,prix){
  let e=panier.find(p=>p.nom===nom);
  if(e) e.qte++;
  else panier.push({nom,prix,qte:1});
  updateBadge();
  showToast("✓ "+nom+" ajouté");
}

function updateBadge(){
  const total=panier.reduce((s,p)=>s+p.qte,0);
  const badge=document.getElementById("count");
  badge.textContent=total;
  badge.style.display=total?"flex":"none";
}

function showPanier(){
  const div=document.getElementById("panier");
  const summary=document.getElementById("summary");
  const form=document.getElementById("orderForm");
  if(!panier.length){
    div.innerHTML=`<div class="cart-empty"><div class="cart-empty-icon">🛒</div>Votre panier est vide</div>`;
    summary.style.display="none";
    form.style.display="none";
    return;
  }
  let subtotalVal=0;
  div.innerHTML=panier.map((p,i)=>{
    const st=p.prix*p.qte;
    subtotalVal+=st;
    return `<div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${p.nom}</div>
        <div class="cart-item-price">${fmtPrice(st)}</div>
      </div>
      <div class="cart-item-controls">
        <button class="ctrl" onclick="moins(${i})">−</button>
        <span class="ctrl-qty">${p.qte}</span>
        <button class="ctrl" onclick="plus(${i})">+</button>
      </div>
    </div>`;
  }).join("");
  const zone=document.getElementById("zone").value;
  const livraison=subtotalVal>=25000?0:(zone==="dakar"?1000:3000);
  document.getElementById("subtotal").textContent=fmtPrice(subtotalVal);
  document.getElementById("livraison").textContent=livraison===0?"🎉 Gratuite !":fmtPrice(livraison);
  document.getElementById("total").textContent=fmtPrice(subtotalVal+livraison);
  summary.style.display="block";
  form.style.display="block";
}

function plus(i){panier[i].qte++;updateBadge();showPanier();}
function moins(i){
  panier[i].qte--;
  if(panier[i].qte<=0) panier.splice(i,1);
  updateBadge();showPanier();
}

function ouvrirPanier(){
  document.getElementById("cartPanel").classList.add("active");
  document.getElementById("overlay").classList.add("active");
  showPanier();
}

function fermerPanier(){
  document.getElementById("cartPanel").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}

function commander(){
  const nom=document.getElementById("nom").value.trim();
  const tel=document.getElementById("tel").value.trim();
  const adr=document.getElementById("adresse").value.trim();
  if(!nom||!tel||!adr){showToast("⚠️ Veuillez remplir tous les champs");return;}
  if(!panier.length){showToast("⚠️ Votre panier est vide");return;}
  const zone=document.getElementById("zone").value;
  const livraison=document.getElementById("livraison").textContent;
  const total=document.getElementById("total").textContent;
  const msg=encodeURIComponent(
`🛒 *Commande GENERAL VAISELLE*

👤 Nom : ${nom}
📞 Tél : ${tel}
📍 Adresse : ${adr}
🗺️ Zone : ${zone==="dakar"?"Dakar":"Hors Dakar"}

---
${panier.map(p=>`• ${p.nom} × ${p.qte}  →  ${fmtPrice(p.prix*p.qte)}`).join("\n")}
---
🚚 Livraison : ${livraison}
💰 *Total : ${total}*`
  );
  window.open(`https://wa.me/221784314946?text=${msg}`,"_blank");
}

  
let toastTimer;
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2000);
}
function openImg(src){
  document.getElementById("imgModalSrc").src = src;
  document.getElementById("imgModal").classList.add("active");
}

function closeImgModal(){
  document.getElementById("imgModal").classList.remove("active");
}

afficherProduits(produits);
</script>

</body>
</html>
