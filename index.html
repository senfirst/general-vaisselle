```html
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENERAL VAISELLE</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:white;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
font-size:22px;

color:#f68b1e;

}

.search-bar{
width:40%;
padding:10px;
border-radius:5px;
border:1px solid #ccc;
}

.menu{
background:#f68b1e;
padding:10px;
text-align:center;
}

.menu a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

.layout{
display:flex;
}

.categories{
width:220px;
background:white;
padding:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.categories ul{
list-style:none;

}

.categories li{
padding:10px;

}

.categories li:hover{

}

.content{
flex:1;

}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.produit{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
transition:0.3s;
position:relative;
}

.produit:hover{
transform:scale(1.04);
}

.produit img{
width:100%;
height:180px;
object-fit:cover;

}

.produit-info{

}

.prix{

font-weight:bold;
}

.btn{
background:#f68b1e;
color:white;

border:none;
width:100%;

cursor:pointer;
}

.panier-float{
position:fixed;

background:#f68b1e;

}

.panier-box{

.modal{

}

</style>
</head>

<body>

<div class="panier-float" onclick="scrollToCommande()">
🛒 <span id="count">0</span>
</div>

<header>

<div class="logo" onclick="filtrer('all')">GENERAL VAISELLE</div>

<input type="text" id="recherche" class="search-bar"
placeholder="Rechercher produit..."
onkeyup="rechercherProduit()">

</header>

<nav class="menu">

<a onclick="filtrer('all')">Accueil</a>
<a onclick="filtrer('cuisine')">Cuisine</a>
<a onclick="filtrer('vaisselle')">Vaisselle</a>
<a onclick="filtrer('tasses')">Tasses</a>

</nav>

<div class="layout">

<aside class="categories">

<h3>Catégories</h3>

<ul>
<li onclick="filtrer('all')">Tous les produits</li>
<li onclick="filtrer('vaisselle')">Vaisselle</li>
<li onclick="filtrer('bols')">Bols</li>
<li onclick="filtrer('tasses')">Tasses</li>
<li onclick="filtrer('cuisine')">Cuisine</li>
</ul>

</aside>

<div class="content">

<h2>Produits</h2>

<div class="grid" id="produits"></div>

<section id="commande">

<h2>Panier</h2>

<div id="panier" class="panier-box">Panier vide</div>

<p>Total : <span id="totalPrix">0</span> FCFA</p>

</section>

</div>
</div>

<footer>

<p>© 2026 GENERAL VAISELLE</p>
<p>Livraison rapide partout à Dakar</p>

</footer>

<div class="modal" id="modal" onclick="fermerZoom()">
<img id="zoomImg">
</div>

<script>

let produits = [

{nom:"Ensemble glasser", prix:9000, image:"A.jpeg"}, 
 {nom:"Mixeur 1", prix:12000, image:"B.jpeg"},
 {nom:"Mixeur 2", prix:10000, image:"C.jpeg"},
 {nom:"Range toilette", prix:6000, image:"D.jpeg"},
 {nom:"Ensemble gamel", prix:15000, image:"H.jpeg"}, 
 {nom:"Deli Glass", prix:2500, image:"3.jpeg"},
 {nom:"7 paquets de bol", prix:3500, image:"11.jpeg"},
 {nom:"Tasses", prix:3000, image:"10.jpeg"},
 {nom:"Bol", prix:5000, image:"I.jpeg"},
 {nom:"Tasse 6pcs", prix:1500, image:"4.jpeg"}, 
 {nom:"Bol en verre", prix:1500, image:"5.jpeg"},
 {nom:"Bol ensemble", prix:15500, image:"M.jpeg"},
 {nom:"Nappes toile 2pcs", prix:3000, image:"8.jpeg"}, 
 {nom:"Tasses 2pcs", prix:3500, image:"6.jpeg"},
 {nom:"Tabouret", prix:1500, image:"T.jpeg"},
 {nom:"Tasse deli glass 6pcs", prix:3000, image:"U.jpeg"}, 
 {nom:"tasses", prix:6000, image:"13.jpeg"}, 
 {nom:"tasses", prix:5000, image:"14.jpeg"},
 {nom:"ensemble marmite", prix:12000, image:"15.jpeg"},
 {nom:"marmite", prix:3500, image:"16.jpeg"}, 
 {nom:"marmite", prix:3000, image:"17.jpeg"}, 
 {nom:"tasses 6pcs", prix:3500, image:"18.jpeg"},
 {nom:"Tasses boissons", prix:3500, image:"19.jpeg"}, 
 {nom:"ensemble", prix:12000, image:"20.jpeg"}, 
 {nom:"Bol en plastique", prix:500, image:"21.jpeg"}, 
 {nom:"Bol en verre", prix:1500, image:"5.jpeg"},
 {nom:"Bol ensemble", prix:15500, image:"M.jpeg"},
 {nom:"Nappes toile 2pcs", prix:3000, image:"8.jpeg"},
 {nom:"Tasses 2pcs", prix:3500, image:"6.jpeg"},
 {nom:"Tabouret", prix:1500, image:"T.jpeg"},
 {nom:"Tasse deli glass 6pcs", prix:3000, image:"U.jpeg"},
 {nom:"Glassser ensemble", prix:15000, image:"7.jpeg"} 

];

let panier=[];

function afficherProduits(liste=produits){

let c=document.getElementById("produits");
c.innerHTML="";

liste.forEach(p=>{

c.innerHTML+=`
<div class="produit">

<img src="${p.image}" onclick="zoom('${p.image}')">

<div class="produit-info">

<h4>${p.nom}</h4>

<p class="prix">${p.prix} FCFA</p>

<button class="btn"
onclick="ajouterProduitPanier('${p.nom}',${p.prix})">
Ajouter au panier
</button>

</div>

</div>
`;

});

}

function filtrer(cat){

if(cat==="all"){
afficherProduits(produits);
return;
}

let liste=produits.filter(p=>p.cat===cat);

afficherProduits(liste);

}

function rechercherProduit(){

let val=document.getElementById("recherche").value.toLowerCase();

afficherProduits(
produits.filter(p=>p.nom.toLowerCase().includes(val))
);

}

function ajouterProduitPanier(nom,prix){

let exist=panier.find(p=>p.nom===nom);

if(exist){exist.qte++}
else{panier.push({nom,prix,qte:1})}

afficherPanier();

}

function afficherPanier(){

let div=document.getElementById("panier");
div.innerHTML="";
let total=0;

if(panier.length===0){div.innerHTML="Panier vide"}

panier.forEach((p,i)=>{

let st=p.prix*p.qte;
total+=st;

div.innerHTML+=`
<p>
${p.nom} x${p.qte} = ${st} FCFA
<button onclick="moins(${i})">➖</button>
<button onclick="plus(${i})">➕</button>
<button onclick="supprimer(${i})">❌</button>
</p>
`;

});

document.getElementById("totalPrix").innerText=total;

document.getElementById("count").innerText=
panier.reduce((s,p)=>s+p.qte,0);

}

function plus(i){panier[i].qte++;afficherPanier()}
function moins(i){panier[i].qte>1?panier[i].qte--:panier.splice(i,1);afficherPanier()}
function supprimer(i){panier.splice(i,1);afficherPanier()}

function zoom(src){
document.getElementById("modal").style.display="flex";
document.getElementById("zoomImg").src=src;
}

function fermerZoom(){
document.getElementById("modal").style.display="none";
}

function scrollToCommande(){
document.getElementById("commande").scrollIntoView({behavior:"smooth"});
}

window.onload=()=>{
afficherProduits();
}

</script>

</body>
</html>
