<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENERAL VAISELLE</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f1e6;
color:#000;
}

header{
background:#000;
color:#f5f1e6;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-weight:bold;
font-size:22px;
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:40px;
border-radius:6px;
}

.search-bar{
width:50%;
padding:10px;
border-radius:5px;
border:1px solid #ccc;
}

.section{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.produit{
background:#fffaf0;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.produit img{
width:100%;
height:180px;
object-fit:cover;
}

.produit-info{
padding:10px;
}

.prix{
color:#8b6f47;
font-weight:bold;
}

.btn{
background:#000;
color:#f5f1e6;
padding:8px;
border:none;
width:100%;
cursor:pointer;
border-radius:5px;
font-weight:bold;
margin-top:5px;
}

.btn:hover{background:#333;}

.panier-box{
background:#fffaf0;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

input{
padding:10px;
margin:5px;
width:90%;
border-radius:5px;
border:1px solid #ccc;
}

</style>
</head>

<body>

<header>
<div class="logo">🛒 GENERAL VAISELLE <img src="logo.png"></div>
<input type="text" id="recherche" class="search-bar" placeholder="Rechercher..." onkeyup="rechercherProduit()">
</header>

<!-- PRODUITS -->
<section class="section">
<h2>Produits</h2>
<div class="grid" id="produits"></div>
</section>

<!-- PANIER -->
<section class="section">
<h2>🛒 Panier</h2>
<div id="panier" class="panier-box">Panier vide</div>
<p><strong>Total: <span id="totalPrix">0</span> FCFA</strong></p>
</section>

<!-- LIVRAISON -->
<section class="section">
<h2>📦 Livraison</h2>
<input type="text" id="clientNom" placeholder="Nom complet">
<input type="text" id="clientTel" placeholder="Téléphone">
<input type="text" id="clientAdresse" placeholder="Adresse">
<button class="btn" onclick="commander()">Commander</button>
</section>

<script>

/* PRODUITS */
let produits = [
{nom:"Ensemble glasser", prix:9000, image:"A.jpeg"},
{nom:"Mixeur 1", prix:12000, image:"B.jpeg"},
{nom:"Mixeur 2", prix:10000, image:"C.jpeg"},
{nom:"Range toilette", prix:6000, image:"D.jpeg"},
{nom:"Ensemble gamel", prix:15000, image:"H.jpeg"},
{nom:"Deli Glass", prix:2500, image:"3.jpeg"},
{nom:"7 paquets", prix:3500, image:"G.jpeg"},
{nom:"Tasses", prix:3000, image:"E.jpeg"},
{nom:"Bol", prix:5000, image:"I.jpeg"},
{nom:"Tasse 6pcs", prix:1500, image:"4.jpeg"},
{nom:"Bol en verre", prix:1500, image:"5.jpeg"},
{nom:"Bol ensemble", prix:15500, image:"M.jpeg"},
{nom:"Nappes toile 2pcs", prix:3000, image:".jpeg"},
{nom:"Tasses 2pcs", prix:3500, image:"6.jpeg"},
{nom:"Tabouret", prix:1500, image:"T.jpeg"},
{nom:"Tasse deli glass 6pcs", prix:3000, image:"U.jpeg"},
{nom:"Glassser ensemble", prix:15000, image:"7.jpeg"}
];

let panier = [];
let fraisLivraison = 500;

/* AFFICHAGE PRODUITS */
function afficherProduits(liste = produits){
let c = document.getElementById("produits");
c.innerHTML="";

liste.forEach((p)=>{
c.innerHTML += `
<div class="produit">
<img src="${p.image}" onerror="this.src='https://via.placeholder.com/300'">
<div class="produit-info">
<h4>${p.nom}</h4>
<p class="prix">${p.prix} FCFA</p>
<button class="btn" onclick="ajouterProduitPanier('${p.nom}',${p.prix})">🛒 Ajouter</button>
</div>
</div>`;
});
}

/* RECHERCHE */
function rechercherProduit(){
let val = document.getElementById("recherche").value.toLowerCase();
afficherProduits(produits.filter(p=>p.nom.toLowerCase().includes(val)));
}

/* PANIER */
function ajouterProduitPanier(nom, prix){
let exist = panier.find(p => p.nom === nom);
if(exist){exist.qte++;} else {panier.push({nom, prix, qte:1});}
afficherPanier();
}

function afficherPanier(){
let div = document.getElementById("panier");
div.innerHTML="";
let total=0;

panier.forEach((p,i)=>{
let st=p.prix*p.qte;
total+=st;

div.innerHTML += `
<p>${p.nom} x${p.qte} = ${st} FCFA
<button onclick="moins(${i})">➖</button>
<button onclick="plus(${i})">➕</button>
<button onclick="supprimer(${i})">❌</button>
</p>`;
});

document.getElementById("totalPrix").innerText=total;
}

function plus(i){panier[i].qte++; afficherPanier();}
function moins(i){panier[i].qte>1?panier[i].qte--:panier.splice(i,1); afficherPanier();}
function supprimer(i){panier.splice(i,1); afficherPanier();}

/* COMMANDE WHATSAPP */
function commander(){
let nom=document.getElementById("clientNom").value;
let tel=document.getElementById("clientTel").value;
let adresse=document.getElementById("clientAdresse").value;

if(panier.length===0){alert("Panier vide");return;}
if(!nom||!tel||!adresse){alert("Remplir infos");return;}

let total=panier.reduce((s,p)=>s+p.prix*p.qte,0)+fraisLivraison;

let msg=encodeURIComponent(
`🛒 Commande GENERAL VAISELLE
Nom:${nom}
Tel:${tel}
Adresse:${adresse}

Articles:
${panier.map(p=>p.nom+" x"+p.qte).join("\n")}

Total:${total} FCFA`
);

window.open(`https://wa.me/221788626180?text=${msg}`);

panier=[];
afficherPanier();
}

/* INIT */
window.onload=()=>{
afficherProduits();
};

</script>

</body>
</html>
